# Configuration des chemins
paths:
  raw_data_path: "data/raw"
  processed_data_path: "data/processed"
  model_path: "models"

# Informations sur le dataset
dataset:
  name: 'gdiz_dataset.parquet'
  target_column: 'target'
  features:
    - 'benin_season'
    - 'machine_type'
    - 'ambient_temperature'
    - 'process_temperature'
    - 'rotational_speed'
    - 'torque'
    - 'tool_wear'
    - 'activity_level'
    - 'vibration'
    - 'humidity'
    - 'dust_concentration'
    - 'rain_flag'
    - 'power_loss_indicator'
    - 'voltage_level'
    - 'voltage_stability'
    # Features temporelles (rolling 24h) — calculées par src/features.py
    - 'tool_wear_delta_24h'
    - 'vibration_max_24h'
    - 'process_temp_max_24h'

# Paramètres de tracking des expériences mlflow
mlflow:
  experiment_name: "GDIZ_Predictive_Maintenance"
  tracking_uri: "sqlite:///mlflow.db"
  model_name: "LGBM_Predictive_Maintenance"