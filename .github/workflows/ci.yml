name: MLOps Quality Check

# On dit à GitHub de se réveiller à chaque "push" sur la branche main
on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Le robot utilise un Linux tout propre

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer les tests unitaires
        run: |
          python -m pytest

      - name: Vérifier le Build Docker
        run: |
          docker build -t maintenance-api:test .