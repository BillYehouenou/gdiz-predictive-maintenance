name: MLOps Quality Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - run: uv python install 3.11

      - name: Installer les dépendances dev
        run: uv sync --frozen --group dev

      - name: Vérifier le formatage (ruff format)
        run: uv run ruff format --check .

      - name: Linting (ruff check)
        run: uv run ruff check .

      - name: Vérification des types (mypy)
        run: uv run mypy src app

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - run: uv python install 3.11

      - name: Installer les dépendances (prod + dev)
        run: uv sync --frozen --group dev

      - name: Cache des artefacts du pipeline ML (données + modèle)
        id: cache-pipeline
        uses: actions/cache@v4
        with:
          path: |
            data/raw
            models
            mlflow.db
            mlruns
          key: pipeline-${{ hashFiles('scripts/generate_synthetic_data.py', 'scripts/run_training.py', 'src/**/*.py', 'config/config.yaml') }}

      - name: Générer les données et entraîner le modèle (si le cache ne correspond pas)
        if: steps.cache-pipeline.outputs.cache-hit != 'true'
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
          PYTHONPATH: .
        run: |
          uv run python scripts/generate_synthetic_data.py
          uv run python scripts/run_training.py

      - name: Lancer les tests avec couverture
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: uv run pytest tests/ -v --cov=src --cov=app --cov-report=term-missing --cov-fail-under=40

  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier le Build Docker
        run: docker build -t gdiz-maintenance-api:ci .
